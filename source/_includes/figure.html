{% assign figure_num = figure_num | plus: 1 %}
<figure id="fig:{{ include.id }}">
  <div class="x-scrollable">
    <img src="{% link {{ include.file }} %}" width="{{ include.width }}" alt="{{ include.alt }}" />
  </div>
  <figcaption>Figure {{ figure_num }}: {{ include.caption }}</figcaption>
</figure>
